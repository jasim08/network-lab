events { worker_connections 1024; }

http {
    # DDoS MITIGATION: Rate limit zone
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=2r/s;

    upstream backend_servers {
        server app_backend_1:3000;
        server app_backend_2:3000;
    }

    server {
        listen 80;

        location / {
            # 1. DDoS Shield: Apply Rate Limiting
            limit_req zone=api_limit burst=5 nodelay;

            # 2. WAF Simulation: Block simple SQL Injection patterns in URL
            if ($query_string ~* "union.*select.*\(|select.*from.*|insert.*into.*") {
                return 403 "WAF Blocked: Malicious SQL Query Detected!";
            }

            # 3. WAF Simulation: Block Cross-Site Scripting scripts
            if ($query_string ~* "<script.*?>.*?</script>") {
                return 403 "WAF Blocked: XSS Script Insertion Prevented!";
            }

            proxy_pass http://backend_servers;
        }
    }
}