events { worker_connections 1024; }

http {
    # API GATEWAY FEATURE: Rate Limiting Zone (Allows max 2 requests per second per IP)
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=2r/s;

    # REVERSE PROXY & LOAD BALANCER: Grouping our cluster
    upstream backend_servers {
        server backend.internal:3000; # Points to the private DNS cluster group
    }

    server {
        listen 80;

        location / {
            # Apply Rate Limiting Policy
            limit_req zone=api_limit burst=5 nodelay;

            # Forward request to the load-balanced cluster
            proxy_pass http://backend_servers;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}