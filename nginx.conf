events {
    worker_connections 1024;
}

http {
    # Logging formats to monitor incoming connections
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';

    access_log /var/log/nginx/access.log main;
    error_log  /var/log/nginx/error.log warn;

    # Timeouts
    keepalive_timeout  65;
    client_max_body_size 10M;

    server {
        listen 80;
        server_name localhost;

        # Main Entry Route: Points to the app_backend domain name defined by Docker
        location / {
            proxy_pass http://app_backend:3000;
            
            # Vital network headers passed to the app indicating request origins
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;

            # Robust timeout safeguards
            proxy_connect_timeout       90;
            proxy_send_timeout          90;
            proxy_read_timeout          90;
        }

        # Custom Network Diagnostic Endpoint
        location /vpc-status {
            return 200 '{"status": "healthy", "gateway": "nginx_public_proxy"}';
            add_header Content-Type application/json;
        }
    }
}