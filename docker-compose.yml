services:
  nginx_proxy:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - public_net
    depends_on:
      - app_backend

  app_backend:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - .:/app
    command: sh -c "npm install && npm start"
    environment:
      PORT: 3000
      PGHOST: postgres_db
      PGPORT: 5432
      PGUSER: user
      PGPASSWORD: password
      PGDATABASE: postgres
    ports:
      - "3000:3000"
    networks:
      - public_net
      - private_net
    depends_on:
      - postgres_db

  postgres_db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: postgres
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    expose:
      - "5432"
    networks:
      - private_net

networks:
  public_net:
    driver: bridge
  private_net:
    driver: bridge