services:
  # =========================================================================
  # 1. API GATEWAY & HTTPS REVERSE PROXY
  # =========================================================================
  nginx_gateway:
    image: nginx:alpine
    container_name: nginx_gateway
    ports:
      - "8080:80"   
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - gateway_to_backend_net
    depends_on:
      - app_backend_1
      - app_backend_2

  # =========================================================================
  # 2. APPLICATION LAYER: Replicas running in Micro-segmented Networks
  # =========================================================================
  app_backend_1:
    image: node:20-alpine
    container_name: app_backend_1
    working_dir: /app
    volumes:
      - .:/app
      - .:/certs 
    command: sh -c "npm install && npm start"
    environment:
      PORT: 3000
      PGHOST: postgres_db
      PGPORT: 5432
      PGUSER: user
      PGPASSWORD: password
      PGDATABASE: postgres
    networks:
      - gateway_to_backend_net
      - backend_to_db_net

  app_backend_2:
    image: node:20-alpine
    container_name: app_backend_2
    working_dir: /app
    volumes:
      - .:/app
      - .:/certs 
    command: sh -c "npm install && npm start"
    environment:
      PORT: 3000
      PGHOST: postgres_db
      PGPORT: 5432
      PGUSER: user
      PGPASSWORD: password
      PGDATABASE: postgres
    networks:
      - gateway_to_backend_net
      - backend_to_db_net

  # =========================================================================
  # 3. DATA LAYER: Enforces Strict Mutual TLS (mTLS) Inbound
  # =========================================================================
  postgres_db:
    image: postgres:15-alpine
    container_name: postgres_db
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - .:/certs:ro 
    command: >
      postgres
      -c ssl=on
      -c ssl_cert_file=/certs/postgres.crt
      -c ssl_key_file=/certs/postgres.key
      -c ssl_ca_file=/certs/rootCA.crt
      -c hba_file=/certs/pg_hba.conf
    networks:
      backend_to_db_net:
        aliases:
          - postgres_db # FIXED: Registered correctly inside network context

# =========================================================================
# NETWORKS DEFINITIONS
# =========================================================================
networks:
  gateway_to_backend_net:
    driver: bridge
  backend_to_db_net:
    driver: bridge