version: '3.8'

services:
  nginx_proxy:
    image: nginx:alpine
    ports:
      - "8080:80"   # The ONLY entry point from the outside world (Host Machine)
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - public_net  # Sits strictly in the public subnet
    depends_on:
      - app_backend

  app_backend:
    image: node:20-alpine
    working_dir: /app
    volumes:
      - .:/app
    command: sh -c "npm install && npm start"
    environment:
      PORT: 3000
      PGHOST: postgres_db
      PGPORT: 5432
      PGUSER: user
      PGPASSWORD: password
      PGDATABASE: postgres
    # REMOVED ports config to isolate it from your host machine
    networks:
      - public_net   # Accessible ONLY by Nginx
      - private_net  # Can talk to the Database
    depends_on:
      - postgres_db

  postgres_db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: postgres
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    # REMOVED ports config so no one can bypass the network to attack DB directly
    networks:
      - private_net  # Sits strictly in the isolated private subnet


  # ADDING THE VPN GATEWAY
  vpn_gateway:
    image: kylemanna/openvpn
    container_name: vpn_gateway
    ports:
      - "1194:1194/udp" # Expose the VPN port to your host machine
    volumes:
      - ./openvpn-data:/etc/openvpn
    cap_add:
      - NET_ADMIN # Required to configure the secure network tunnel
    networks:
      - private_net # Gives the VPN server direct access to your private database

networks:
  public_net:
    driver: bridge
    ipam:
      config:
        - subnet: 10.0.1.0/24  # Explicit CIDR Block for Public Subnet
  private_net:
    driver: bridge
    ipam:
      config:
        - subnet: 10.0.2.0/24  # Explicit CIDR Block for Private Subnet