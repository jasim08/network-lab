services:
  # =========================================================================
  # EDGE: INTERNET GATEWAY & WAF / DDOS RATE LIMITING
  # =========================================================================
  nginx_gateway:
    image: nginx:alpine
    container_name: nginx_gateway
    ports:
      - "8080:80"   
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - gateway_to_backend_net # ZERO TRUST: Strict micro-segmentation
    depends_on:
      - app_backend_1
      - app_backend_2

  # =========================================================================
  # COMPUTE TIER: Isolated from direct gateway administration
  # =========================================================================
  app_backend_1:
    image: node:20-alpine
    container_name: app_backend_1
    working_dir: /app
    volumes:
      - .:/app
    command: sh -c "npm install && npm start"
    environment:
      PORT: 3000
      PGHOST: postgres_db.internal
      PGPORT: 5432
      PGUSER: user
      PGPASSWORD: password
      PGDATABASE: postgres
    networks:
      gateway_to_backend_net: # Access from API Gateway
      backend_to_db_net:      # ZERO TRUST: Isolated pipeline to Database

  app_backend_2:
    image: node:20-alpine
    container_name: app_backend_2
    working_dir: /app
    volumes:
      - .:/app
    command: sh -c "npm install && npm start"
    environment:
      PORT: 3000
      PGHOST: postgres_db.internal
      PGPORT: 5432
      PGUSER: user
      PGPASSWORD: password
      PGDATABASE: postgres
    networks:
      gateway_to_backend_net: 
      backend_to_db_net:      

  # =========================================================================
  # DATA LAYER: Strict Zero-Trust Enforcement
  # =========================================================================
  postgres_db:
    image: postgres:15-alpine
    container_name: postgres_db
    privileged: true 
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: postgres
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    command: >
      sh -c "
      apk add --no-cache iptables &&
      iptables -F &&
      iptables -A INPUT -m state --state ESTABLISHED,RELATED -j ACCEPT &&
      # ZERO TRUST HOST FILTER: Drop everything that isn't an explicit application query
      iptables -A INPUT -p tcp --dport 5432 -j ACCEPT &&             
      iptables -P INPUT DROP &&                                       
      docker-entrypoint.sh postgres
      "
    networks:
      backend_to_db_net:
        aliases:
          - postgres_db.internal

# =========================================================================
# ZERO TRUST MICRO-SEGMENTATION NETWORKS
# =========================================================================
networks:
  gateway_to_backend_net:
    driver: bridge # Isolates Gateway -> Backend traffic
  backend_to_db_net:
    driver: bridge # Isolates Backend -> Database traffic. Gateway cannot reach here!