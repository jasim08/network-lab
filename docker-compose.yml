services:
  # =========================================================================
  # 1. API GATEWAY & REVERSE PROXY / LOAD BALANCER
  # =========================================================================
  nginx_gateway:
    image: nginx:alpine
    container_name: nginx_gateway
    ports:
      - "8080:80"   # Exposed to your laptop via the IGW layer
    volumes:
      # We inject custom config for load balancing, rate limiting, and private proxying
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      public_net:
        aliases:
          - api.mycompany.internal # PRIVATE DNS: Internal routing alias
    depends_on:
      - app_backend_1
      - app_backend_2

  # =========================================================================
  # 2. APPLICATION LAYER: Load Balanced Backend Replicas
  # =========================================================================
  app_backend_1:
    image: node:20-alpine
    container_name: app_backend_1
    working_dir: /app
    volumes:
      - .:/app
    command: sh -c "npm install && npm start"
    environment:
      PORT: 3000
      PGHOST: postgres_db.internal # PRIVATE DNS: Resolves strictly via internal zone
      PGPORT: 5432
      PGUSER: user
      PGPASSWORD: password
      PGDATABASE: postgres
    networks:
      public_net:
        aliases:
          - backend.internal # Private DNS round-robin group
      private_net:

  app_backend_2:
    image: node:20-alpine
    container_name: app_backend_2
    working_dir: /app
    volumes:
      - .:/app
    command: sh -c "npm install && npm start"
    environment:
      PORT: 3000
      PGHOST: postgres_db.internal
      PGPORT: 5432
      PGUSER: user
      PGPASSWORD: password
      PGDATABASE: postgres
    networks:
      public_net:
        aliases:
          - backend.internal # Private DNS round-robin group
      private_net:

  # =========================================================================
  # 3. DATA LAYER: Secured Database with Private DNS Profile
  # =========================================================================
  postgres_db:
    image: postgres:15-alpine
    container_name: postgres_db
    privileged: true 
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: postgres
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    command: >
      sh -c "
      apk add --no-cache iptables &&
      iptables -F &&
      iptables -A INPUT -m state --state ESTABLISHED,RELATED -j ACCEPT &&
      iptables -A INPUT -p tcp -s 10.0.2.20 --dport 5432 -j ACCEPT && 
      iptables -A INPUT -p tcp --dport 5432 -j ACCEPT &&             
      iptables -P INPUT DROP &&                                       
      docker-entrypoint.sh postgres
      "
    networks:
      private_net:
        aliases:
          - postgres_db.internal # PRIVATE DNS: Only reachable inside private_net

  # 4. BASTION HOST: Secure jump box
  bastion_host:
    image: alpine:latest
    container_name: bastion_host
    ports:
      - "2222:22"
    privileged: true
    command: >
      sh -c "
      apk add --no-cache openssh-server openssh-client &&
      ssh-keygen -A &&
      echo 'root:admin123' | chpasswd &&
      echo 'PermitRootLogin yes' >> /etc/ssh/sshd_config &&
      echo 'PasswordAuthentication yes' >> /etc/ssh/sshd_config &&
      /usr/sbin/sshd -D
      "
    networks:
      public_net:
        ipv4_address: 10.0.1.20
      private_net:
        ipv4_address: 10.0.2.20

  # 5. NAT GATEWAY: Network ACL layer
  nat_gateway:
    image: alpine:latest
    container_name: nat_gateway
    privileged: true   
    command: >
      sh -c "
      echo 1 > /proc/sys/net/ipv4/ip_forward &&
      apk add --no-cache iptables &&
      iptables -F &&
      iptables -A FORWARD -s 10.0.2.0/24 -d 203.0.113.5 -j DROP &&
      iptables -t nat -A POSTROUTING -o eth0 -j MASQUERADE &&
      sleep infinity
      "
    networks:
      public_net:
        ipv4_address: 10.0.1.50   
      private_net:
        ipv4_address: 10.0.2.50   

networks:
  public_net:
    driver: bridge
    ipam:
      config:
        - subnet: 10.0.1.0/24     
  private_net:
    driver: bridge
    ipam:
      config:
        - subnet: 10.0.2.0/24