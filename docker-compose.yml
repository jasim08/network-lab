services:
  # 1. PUBLIC INGRESS: Router for Web Traffic
  nginx_proxy:
    image: nginx:alpine
    container_name: nginx_proxy
    ports:
      - "8080:80"   
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    networks:
      - public_net  
    depends_on:
      - app_backend

  # 2. APPLICATION LAYER: The bridge component linking both tiers
  app_backend:
    image: node:20-alpine
    container_name: app_backend
    working_dir: /app
    volumes:
      - .:/app
    command: sh -c "npm install && npm start"
    environment:
      PORT: 3000
      PGHOST: postgres_db
      PGPORT: 5432
      PGUSER: user
      PGPASSWORD: password
      PGDATABASE: postgres
    networks:
      - public_net   
      - private_net  
    depends_on:
      - postgres_db
      - nat_gateway

  # 3. DATA LAYER: Isolated Database
  postgres_db:
    image: postgres:15-alpine
    container_name: postgres_db
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: postgres
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - private_net  

  # =========================================================================
  # NEW: BASTION HOST (Replaces the VPN Gateway for SSH administration)
  # =========================================================================
  # =========================================================================
  # BULLETPROOF ALPINE BASTION HOST
  # =========================================================================
  bastion_host:
    image: alpine:latest
    container_name: bastion_host
    ports:
      - "2222:22"
    privileged: true
    command: >
      sh -c "
      apk add --no-cache openssh-server openssh-client &&
      ssh-keygen -A &&
      echo 'root:admin123' | chpasswd &&
      echo 'PermitRootLogin yes' >> /etc/ssh/sshd_config &&
      echo 'PasswordAuthentication yes' >> /etc/ssh/sshd_config &&
      /usr/sbin/sshd -D
      "
    networks:
      public_net:
        ipv4_address: 10.0.1.20
      private_net:
        ipv4_address: 10.0.2.20

  # 5. NAT GATEWAY: Outbound traffic proxy
  nat_gateway:
    image: alpine:latest
    container_name: nat_gateway
    privileged: true   
    command: >
      sh -c "
      echo 1 > /proc/sys/net/ipv4/ip_forward &&
      apk add --no-cache iptables &&
      iptables -t nat -A POSTROUTING -o eth0 -j MASQUERADE &&
      sleep infinity
      "
    networks:
      public_net:
        ipv4_address: 10.0.1.50   
      private_net:
        ipv4_address: 10.0.2.50   

networks:
  public_net:
    driver: bridge
    ipam:
      config:
        - subnet: 10.0.1.0/24     
  private_net:
    driver: bridge
    ipam:
      config:
        - subnet: 10.0.2.0/24